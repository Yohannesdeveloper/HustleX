version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Production override for docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This override:
#   - Builds production (multi-stage) images instead of dev targets
#   - Removes hot-reload volumes
#   - Scales API to 3 replicas behind nginx
#   - Targets external managed MongoDB Atlas and Redis (Elasticache/managed)
# ─────────────────────────────────────────────────────────────────────────────

services:
  mongo:
    # In production, use MongoDB Atlas — disable local container
    profiles:
      - local-only

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD}
        --bind 0.0.0.0
    deploy:
      resources:
        limits:
          memory: 640M
        reservations:
          memory: 512M

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production     # Use the hardened production stage
    restart: always
    volumes: []              # No source mounts in production
    command: ["node", "server.js"]
    environment:
      NODE_ENV: production
      MONGODB_TLS_INSECURE: "false"
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    restart: always
    volumes: []              # No source mounts in production

  nginx:
    image: nginx:1.25-alpine
    container_name: hustlex-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - api
      - frontend
    networks:
      - hustle
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  nginx-cache:
    driver: local
