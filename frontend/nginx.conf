# nginx configuration for the HustleX React SPA
# Placed in /etc/nginx/conf.d/default.conf inside the frontend container

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"                always;
    add_header X-Content-Type-Options  "nosniff"                   always;
    add_header X-XSS-Protection        "1; mode=block"             always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Cache: long-lived for content-hashed Vite assets ─────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Cache: no-cache for index.html so updates deploy instantly
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA routing: all unknown paths serve index.html ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check for load-balancer probes ────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Block dot-files (e.g. .env, .git) ────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
