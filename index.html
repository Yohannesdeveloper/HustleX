    <style>
      #splash {
        position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        background:#1e3a5f;color:#fff;font-family:sans-serif;z-index:9999;

      }
      #splash-bar {
        width:160px;height:4px;border-radius:2px;overflow:hidden;
        background:rgba(255,255,255,0.2);margin-top:16px;
      }
      #splash-bar-inner {
        width:40%;height:100%;border-radius:2px;
        background:#60a5fa;animation:splash-load 1s ease-in-out infinite;
      }
      @keyframes splash-load {
        0%{transform:translateX(-100%)} 50%{transform:translateX(150%)} 100%{transform:translateX(350%)}
      }
    </style>
    <div id="splash">

  <script>
    // Unregister any stale Service Worker from a previous broken build
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        for (var i = 0; i < regs.length; i++) { regs[i].unregister(); }
      });
    }
