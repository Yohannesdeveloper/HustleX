# Production stack — API + worker + Redis + nginx load balancer
# Usage:
#   cp .env.production.example .env   (fill values)
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml up -d --scale api=3 --scale worker=2

version: "3.8"

services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      QUEUE_ENABLED: "true"
      MESSAGE_ASYNC: "true"
      SCALE_MODE: production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads
      - ./logs:/app/logs
    networks:
      - hustlex-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5000/api/health/detailed', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  worker:
    build: .
    restart: unless-stopped
    command: node workers/queue-worker.js
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      QUEUE_ENABLED: "true"
      MESSAGE_ASYNC: "true"
      SCALE_MODE: production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - hustlex-network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - hustlex-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - hustlex-network

volumes:
  redis-data:
  uploads-data:

networks:
  hustlex-network:
    driver: bridge
