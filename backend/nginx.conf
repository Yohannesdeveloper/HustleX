events {
  worker_connections 1024;
}

http {
  # Upstream API servers (load balancing)
  upstream hustlex_api {
    least_conn; # Distribute to server with fewest connections
    server api:5000 max_fails=3 fail_timeout=30s;
    # Add more servers for horizontal scaling:
    # server api2:5000 max_fails=3 fail_timeout=30s;
    # server api3:5000 max_fails=3 fail_timeout=30s;
  }

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1000;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Logging
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment in production with SSL)
    # return 301 https://$host$request_uri;

    # Health check endpoint (no rate limiting)
    location /api/health {
      proxy_pass http://hustlex_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Auth routes (stricter rate limiting)
    location /api/auth {
      limit_req zone=auth burst=10 nodelay;
      
      proxy_pass http://hustlex_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Timeout settings
      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # API routes (general rate limiting)
    location /api {
      limit_req zone=api burst=50 nodelay;
      
      proxy_pass http://hustlex_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Timeout settings
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      
      # WebSocket support
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Uploads (static files)
    location /uploads {
      proxy_pass http://hustlex_api;
      proxy_cache_valid 200 7d; # Cache for 7 days
      add_header Cache-Control "public, max-age=604800";
    }

    # Block access to sensitive files
    location ~ /\. {
      deny all;
    }
  }

  # HTTPS Server (uncomment and configure in production)
  # server {
  #   listen 443 ssl http2;
  #   server_name your-domain.com;
  #
  #   ssl_certificate /etc/nginx/ssl/cert.pem;
  #   ssl_certificate_key /etc/nginx/ssl/key.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #
  #   # Same locations as above...
  # }
}
